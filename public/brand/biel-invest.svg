<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="BIEL Invest">
  <title>BIEL Invest</title>

  <!-- Mark: two overlapping eye / lens shapes -->
  <g fill="none" stroke="#1F8FC7" stroke-width="22" stroke-linecap="round" stroke-linejoin="round">
    <path d="M250 200 C 300 150, 400 150, 450 200 C 400 250, 300 250, 250 200 Z" />
    <path d="M350 200 C 400 150, 500 150, 550 200 C 500 250, 400 250, 350 200 Z" />
  </g>

  <!-- Wordmark BIEL -->
  <text
    x="400"
    y="450"
    text-anchor="middle"
    font-family="Inter, system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-weight="600"
    font-size="160"
    letter-spacing="8"
    fill="#1C1C1C"
  >BIEL</text>

  <!-- Wordmark INVEST -->
  <text
    x="400"
    y="555"
    text-anchor="middle"
    font-family="Inter, system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-weight="400"
    font-size="64"
    letter-spacing="22"
    fill="#6B6762"
  >INVEST</text>
</svg>
